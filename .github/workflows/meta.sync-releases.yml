name: Sync Releases from EpicenterHQ/epicenter to braden-w/whispering

on:
  release:
    types: [published, edited]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to sync (e.g., v7.2.1)'
        required: false
        type: string

jobs:
  sync-release:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Get release tag
        id: get_tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.release_tag }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ -n "$INPUT_TAG" ]; then
            echo "tag=$INPUT_TAG" >> $GITHUB_OUTPUT
          else
            echo "tag=$RELEASE_TAG" >> $GITHUB_OUTPUT
          fi

      - name: Fetch source release information
        id: source_release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.get_tag.outputs.tag }}
        run: |
          echo "Fetching release $TAG from EpicenterHQ/epicenter..."

          # Get release info
          RELEASE_JSON=$(gh api "repos/EpicenterHQ/epicenter/releases/tags/$TAG")

          # Extract fields
          echo "name=$(echo "$RELEASE_JSON" | jq -r '.name')" >> $GITHUB_OUTPUT
          echo "body=$(echo "$RELEASE_JSON" | jq -r '.body' | base64 -w 0)" >> $GITHUB_OUTPUT
          echo "draft=$(echo "$RELEASE_JSON" | jq -r '.draft')" >> $GITHUB_OUTPUT
          echo "prerelease=$(echo "$RELEASE_JSON" | jq -r '.prerelease')" >> $GITHUB_OUTPUT

          # Get asset URLs
          echo "$RELEASE_JSON" | jq -r '.assets[].browser_download_url' > asset_urls.txt

      - name: Download release assets
        run: |
          mkdir -p release-assets
          while IFS= read -r url; do
            if [ -n "$url" ]; then
              echo "Downloading $(basename "$url")..."
              curl -L -o "release-assets/$(basename "$url")" "$url"
            fi
          done < asset_urls.txt

      - name: Check if release exists in downstream
        id: check_release
        env:
          GH_TOKEN: ${{ secrets.GH_ACTIONS_PAT }}
          TAG: ${{ steps.get_tag.outputs.tag }}
        run: |
          if gh release view "$TAG" --repo braden-w/whispering >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Release $TAG already exists in braden-w/whispering"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Release $TAG does not exist in braden-w/whispering"
          fi

      - name: Delete existing release if it exists
        if: steps.check_release.outputs.exists == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_ACTIONS_PAT }}
          TAG: ${{ steps.get_tag.outputs.tag }}
        run: |
          echo "Deleting existing release $TAG..."
          gh release delete "$TAG" --repo braden-w/whispering --yes

      - name: Create release in downstream repository
        env:
          GH_TOKEN: ${{ secrets.GH_ACTIONS_PAT }}
          TAG: ${{ steps.get_tag.outputs.tag }}
          RELEASE_NAME: ${{ steps.source_release.outputs.name }}
          RELEASE_BODY_B64: ${{ steps.source_release.outputs.body }}
          RELEASE_DRAFT: ${{ steps.source_release.outputs.draft }}
          RELEASE_PRERELEASE: ${{ steps.source_release.outputs.prerelease }}
        run: |
          echo "$RELEASE_BODY_B64" | base64 -d > release_notes.md

          ARGS=(
            "$TAG"
            --repo braden-w/whispering
            --title "$RELEASE_NAME"
            --notes-file release_notes.md
          )

          if [ "$RELEASE_DRAFT" = "true" ]; then
            ARGS+=(--draft)
          fi

          if [ "$RELEASE_PRERELEASE" = "true" ]; then
            ARGS+=(--prerelease)
          fi

          if [ -n "$(ls -A release-assets 2>/dev/null)" ]; then
            ARGS+=(release-assets/*)
          fi

          gh release create "${ARGS[@]}"

      - name: Summary
        env:
          TAG: ${{ steps.get_tag.outputs.tag }}
        run: |
          echo "## Release Synced Successfully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag**: $TAG" >> $GITHUB_STEP_SUMMARY
          echo "- **Source**: [EpicenterHQ/epicenter](https://github.com/EpicenterHQ/epicenter/releases/tag/$TAG)" >> $GITHUB_STEP_SUMMARY
          echo "- **Destination**: [braden-w/whispering](https://github.com/braden-w/whispering/releases/tag/$TAG)" >> $GITHUB_STEP_SUMMARY
