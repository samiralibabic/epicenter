name: Add Sponsors to README

on:
  workflow_dispatch:
  schedule:
    - cron: '30 15 * * *'

permissions:
  contents: write

jobs:
  update-sponsors:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # NOTE: This workflow is a no-op until <!-- sponsors --><!-- sponsors -->
      # markers are added to README.md.
      - name: Generate Sponsors
        uses: JamesIves/github-sponsors-readme-action@v1
        with:
          token: ${{ secrets.GH_ACTIONS_PAT }}
          file: 'README.md'

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "docs: update sponsors in README"
          git push
