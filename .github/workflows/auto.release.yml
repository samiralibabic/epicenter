name: Auto Release

on:
  pull_request:
    types: [closed]
    branches: [main]

concurrency:
  group: auto-release
  cancel-in-progress: false # queue, don't cancel

jobs:
  release:
    # DISABLED until v8.0.0 is tagged and GH_ACTIONS_PAT secret is configured.
    # To re-enable: change `false` to `github.event.pull_request.merged == true`
    if: false
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # need full history for tags
          token: ${{ secrets.GH_ACTIONS_PAT }}

      - uses: oven-sh/setup-bun@v2

      - name: Get current version from latest tag
        id: current
        run: |
          TAG=$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null || echo 'v0.0.0')
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Compute next version
        id: next
        run: |
          CURRENT="${{ steps.current.outputs.version }}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          TITLE="${{ github.event.pull_request.title }}"
          if echo "$TITLE" | grep -qE '!:'; then
            # Breaking change (feat!: or fix!:) → minor bump
            echo "version=${MAJOR}.$((MINOR + 1)).0" >> "$GITHUB_OUTPUT"
          else
            # Default → patch bump
            echo "version=${MAJOR}.${MINOR}.$((PATCH + 1))" >> "$GITHUB_OUTPUT"
          fi

      - name: Stamp version into all files
        run: bun run bump-version ${{ steps.next.outputs.version }}

      - name: Collect changelog entries
        env:
          GH_TOKEN: ${{ secrets.GH_ACTIONS_PAT }}
        run: |
          set -euo pipefail

          LAST_TAG="v${{ steps.current.outputs.version }}"
          NEXT_VERSION="${{ steps.next.outputs.version }}"

          # Collect PR numbers from merge commits since last tag
          if git rev-parse "$LAST_TAG" >/dev/null 2>&1; then
            PR_NUMBERS=$(git log "${LAST_TAG}..HEAD" --merges --format="%s" \
              | grep -oP 'Merge pull request #\K\d+' \
              | sort -un || true)
          else
            PR_NUMBERS=""
          fi

          # Ensure the triggering PR is always included
          TRIGGER_PR="${{ github.event.pull_request.number }}"
          if [ -n "$TRIGGER_PR" ]; then
            if [ -z "$PR_NUMBERS" ] || ! echo "$PR_NUMBERS" | grep -qw "$TRIGGER_PR"; then
              PR_NUMBERS=$(printf '%s\n%s' "$PR_NUMBERS" "$TRIGGER_PR" | sed '/^$/d')
            fi
          fi

          # Initialize category files
          > /tmp/changelog-new.md
          > /tmp/changelog-fixed.md
          > /tmp/changelog-improved.md

          for PR_NUM in $PR_NUMBERS; do
            [ -z "$PR_NUM" ] && continue

            # Fetch PR metadata
            PR_DATA=$(gh pr view "$PR_NUM" --json title,body,author 2>/dev/null) || continue

            TITLE=$(echo "$PR_DATA" | jq -r '.title')
            AUTHOR=$(echo "$PR_DATA" | jq -r '.author.login')

            # Extract body to file for safe multiline processing
            echo "$PR_DATA" | jq -r '.body // ""' > /tmp/pr-body.txt

            # Extract lines between "## Changelog" and the next "##" header
            ENTRIES=$(awk '/^## Changelog/{found=1; next} /^## /{if(found) exit} found{print}' /tmp/pr-body.txt \
              | grep -E '^\s*[-*]' \
              | sed 's/^\s*[-*]\s*//' || true)

            [ -z "$ENTRIES" ] && continue

            # Append (@author) for contributors outside EpicenterHQ org
            CREDIT=""
            if ! gh api "orgs/EpicenterHQ/members/$AUTHOR" --silent 2>/dev/null; then
              CREDIT=" (@${AUTHOR})"
            fi

            # Route to category file based on PR title prefix
            if echo "$TITLE" | grep -qE '^feat[(!:]'; then
              TARGET="/tmp/changelog-new.md"
            elif echo "$TITLE" | grep -qE '^fix[(!:]'; then
              TARGET="/tmp/changelog-fixed.md"
            else
              TARGET="/tmp/changelog-improved.md"
            fi

            while IFS= read -r entry; do
              [ -z "$entry" ] && continue
              echo "- ${entry}${CREDIT} (#${PR_NUM})" >> "$TARGET"
            done <<< "$ENTRIES"
          done

          # Assemble release body
          {
            HAS_ENTRIES=false

            if [ -s /tmp/changelog-new.md ]; then
              echo "## New"
              echo ""
              cat /tmp/changelog-new.md
              echo ""
              HAS_ENTRIES=true
            fi

            if [ -s /tmp/changelog-fixed.md ]; then
              echo "## Fixed"
              echo ""
              cat /tmp/changelog-fixed.md
              echo ""
              HAS_ENTRIES=true
            fi

            if [ -s /tmp/changelog-improved.md ]; then
              echo "## Improved"
              echo ""
              cat /tmp/changelog-improved.md
              echo ""
              HAS_ENTRIES=true
            fi

            if [ "$HAS_ENTRIES" = false ]; then
              echo "Internal improvements only."
              echo ""
            fi

            echo "**Full diff**: ${LAST_TAG}...v${NEXT_VERSION}"
          } > /tmp/release-body.md

      - name: Commit, tag, push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "release: v${{ steps.next.outputs.version }}"
          git tag "v${{ steps.next.outputs.version }}"
          git push
          git push origin "v${{ steps.next.outputs.version }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GH_ACTIONS_PAT }}
        run: |
          gh release create "v${{ steps.next.outputs.version }}" \
            --title "v${{ steps.next.outputs.version }}" \
            --notes-file /tmp/release-body.md
